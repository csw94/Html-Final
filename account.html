<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>배통 - 계정 연동</title>
<style>
* { padding: 0; margin: 0; box-sizing: border-box; }
body {
  font-family: '맑은고딕', 'Malgun Gothic', sans-serif;
  background: linear-gradient(160deg, #fff5f0 0%, #fff0f5 50%, #f5f0ff 100%);
  min-height: 100vh;
}

/* 네비게이션 */
nav {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 0 40px;
  display: flex;
  align-items: center;
  height: 60px;
}
.nav_logo {
  font-size: 22px; font-weight: bold;
  background: linear-gradient(90deg, #f97316, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-right: 30px; text-decoration: none;
}
.nav_menu { display: flex; gap: 8px; flex: 1; }
.nav_menu a {
  padding: 8px 18px; border-radius: 20px; font-size: 14px;
  text-decoration: none; color: #555;
  border: 1px solid transparent;
}
.nav_menu a:hover { background: #f5f5f5; }
.nav_menu a.active { background: #f0f0f0; font-weight: bold; color: #222; }
.nav_store {
  font-size: 14px; color: #555; padding: 8px 16px;
  border: 1px solid #ddd; border-radius: 20px; text-decoration: none;
}

/* 본문 */
main { max-width: 760px; margin: 0 auto; padding: 50px 20px; }
main h1 {
  font-size: 28px; font-weight: bold; text-align: center;
  background: linear-gradient(90deg, #f97316, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}
main p { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }

/* 플랫폼 카드 */
.platform_card {
  background: white; border-radius: 16px; padding: 20px 24px;
  margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.platform_card.active { border: 2px solid #2bbfbf; }
.platform_header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.platform_info { display: flex; align-items: center; gap: 14px; }
.platform_icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 18px; color: white;
}
.icon_baemin { background: #2bbfbf; }
.icon_coupang { background: #8b5cf6; }
.icon_yogiyo { background: #f43f5e; }
.platform_name { font-size: 16px; font-weight: bold; color: #222; }
.platform_sub { font-size: 13px; color: #aaa; margin-top: 2px; }
.btn_connect {
  background: #2bbfbf; color: white; border: none;
  padding: 10px 20px; border-radius: 20px; font-size: 14px;
  font-weight: bold; cursor: pointer; font-family: '맑은고딕', sans-serif;
  display: flex; align-items: center; gap: 4px;
}
.btn_waiting {
  background: #f0f0f0; color: #aaa; border: none;
  padding: 10px 20px; border-radius: 20px; font-size: 14px;
  cursor: default; font-family: '맑은고딕', sans-serif;
}

/* 입력창 */
.platform_inputs { display: flex; flex-direction: column; gap: 10px; }
.platform_inputs input {
  width: 100%; height: 42px; border: 1.5px solid #e0e0e0;
  border-radius: 10px; padding: 0 14px; font-size: 14px; outline: none;
  font-family: '맑은고딕', sans-serif; color: #555;
}
.platform_inputs input:focus { border-color: #2bbfbf; }

/* 하단 버튼 */
.btn_all {
  width: 100%; height: 52px; background: #e0e0e0; color: #aaa;
  border: none; border-radius: 14px; font-size: 15px; margin-top: 30px;
  font-family: '맑은고딕', sans-serif; cursor: default;
}
</style>
</head>
<body>

<nav>
  <a class="nav_logo" href="login.html">배통</a>
  <div class="nav_menu">
    <a href="main.html">공지사항</a>
    <a href="orders.html">주문관리</a>
    <a href="menu.html">메뉴</a>
    <a href="stats.html">통계</a>
  </div>
  <a class="nav_store" href="#">맛있는 치킨집</a>
</nav>

<main>
  <h1>배달 앱 계정 연동</h1>
  <p>통합 관리를 위해 배달 앱 계정을 연동해주세요</p>

  <!-- 배달의민족 -->
  <div class="platform_card active">
    <div class="platform_header">
      <div class="platform_info">
        <div class="platform_icon icon_baemin">배</div>
        <div>
          <div class="platform_name">배달의민족</div>
          <div class="platform_sub">계정 연동 필요</div>
        </div>
      </div>
      <button class="btn_connect">연동하기 ›</button>
    </div>
    <div class="platform_inputs">
      <input type="text" placeholder="스토어 ID">
      <input type="text" placeholder="api 등록">
    </div>
  </div>

  <!-- 쿠팡이츠 -->
  <div class="platform_card">
    <div class="platform_header">
      <div class="platform_info">
        <div class="platform_icon icon_coupang">쿠</div>
        <div>
          <div class="platform_name">쿠팡이츠</div>
          <div class="platform_sub">계정 연동 필요</div>
        </div>
      </div>
      <button class="btn_waiting">대기 중</button>
    </div>
  </div>

  <!-- 요기요 -->
  <div class="platform_card">
    <div class="platform_header">
      <div class="platform_info">
        <div class="platform_icon icon_yogiyo">요</div>
        <div>
          <div class="platform_name">요기요</div>
          <div class="platform_sub">계정 연동 필요</div>
        </div>
      </div>
      <button class="btn_waiting">대기 중</button>
    </div>
  </div>

  <button class="btn_all">모든 플랫폼 연동 완료 후 진행</button>
</main>

</body>
</html>
