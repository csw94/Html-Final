<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>배통 - 로그인</title>
<style>
* { padding: 0; margin: 0; box-sizing: border-box; }
body {
  font-family: '맑은고딕', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #f9c784 0%, #f7a8b8 40%, #e8b4d8 70%, #d4a8e8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
#logo_area { text-align: center; margin-bottom: 24px; }
#logo_icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, #f97316 0%, #a855f7 100%);
  margin: 0 auto 12px auto;
}
#logo_text {
  font-size: 32px; font-weight: bold;
  background: linear-gradient(90deg, #f97316, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#login_card {
  background: white; border-radius: 20px; padding: 32px 28px;
  width: 340px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 16px;
}
#login_card h2 { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
.input_group { margin-bottom: 14px; }
.input_group label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
.input_group input {
  width: 100%; height: 44px; border: 1.5px solid #e0e0e0;
  border-radius: 10px; padding: 0 14px; font-size: 14px; outline: none;
  font-family: '맑은고딕', sans-serif;
}
.input_group input:focus { border-color: #a855f7; }
.btn_link {
  display: block; text-decoration: none; text-align: center;
}
#btn_login {
  display: block; width: 100%; height: 48px; border: none; border-radius: 12px;
  background: linear-gradient(90deg, #f97316, #ec4899, #a855f7);
  color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px;
  font-family: '맑은고딕', sans-serif;
}
#btn_signup {
  display: block; width: 100%; height: 48px; border: 1.5px solid #ddd; border-radius: 12px;
  background: white; color: #555; font-size: 15px; cursor: pointer; margin-top: 10px;
  font-family: '맑은고딕', sans-serif;
}
#btn_connect {
  display: block; width: 340px; height: 52px; border: none; border-radius: 14px;
  background: #2bbfbf; color: white; font-size: 16px; font-weight: bold;
  cursor: pointer; font-family: '맑은고딕', sans-serif; text-decoration: none;
  line-height: 52px; text-align: center;
}
</style>
</head>
<body>
<div id="logo_area">
  <div id="logo_icon"></div>
  <div id="logo_text">배통</div>
</div>
<div id="login_card">
  <h2>로그인</h2>
  <div class="input_group">
    <label>이메일</label>
    <input type="email">
  </div>
  <div class="input_group">
    <label>비밀번호</label>
    <input type="password">
  </div>
  <a href="main.html" id="btn_login">로그인→</a>
  <a href="#" id="btn_signup">회원가입</a>
</div>
<a href="account.html" id="btn_connect">배달 앱 계정 연동하기</a>
</body>
</html>
